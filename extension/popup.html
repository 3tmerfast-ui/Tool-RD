<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flow Image Bridge</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
      }
      body {
        width: 320px;
        margin: 0;
        padding: 14px 16px 16px;
        color: #1f2937;
        background: #ffffff;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 14px;
        font-weight: 600;
      }
      .sub {
        color: #6b7280;
        margin: 0 0 12px;
        font-size: 11px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-top: 1px solid #f1f5f9;
      }
      .row:first-of-type {
        border-top: none;
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #94a3b8;
        flex-shrink: 0;
      }
      .dot.ok {
        background: #22c55e;
      }
      .dot.err {
        background: #ef4444;
      }
      .label {
        flex: 0 0 90px;
        color: #334155;
      }
      .value {
        flex: 1;
        color: #0f172a;
        word-break: break-all;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        flex: 1;
        padding: 8px 10px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        color: #0f172a;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        font-size: 12px;
      }
      button:hover {
        background: #e2e8f0;
      }
      button.primary {
        background: #0f172a;
        color: #f8fafc;
        border-color: #0f172a;
      }
      button.primary:hover {
        background: #1e293b;
      }
      .copy {
        margin-left: 4px;
        padding: 2px 6px;
        font-size: 10px;
      }
      .error {
        margin-top: 8px;
        padding: 6px 8px;
        background: #fef2f2;
        color: #991b1b;
        border-radius: 4px;
        font-size: 11px;
        display: none;
      }
      .hint {
        margin-top: 10px;
        padding: 8px;
        background: #f1f5f9;
        color: #475569;
        border-radius: 4px;
        font-size: 11px;
        line-height: 1.4;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: #e2e8f0;
        padding: 1px 4px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h1>Flow Image Bridge</h1>
    <p class="sub">v5.0.0 · no CDP · no Python</p>

    <div class="row">
      <span class="dot" id="flowDot"></span>
      <span class="label">Flow tab</span>
      <span class="value" id="flowVal">checking…</span>
    </div>
    <div class="row">
      <span class="dot" id="authDot"></span>
      <span class="label">Auth</span>
      <span class="value" id="authVal">checking…</span>
    </div>
    <div class="row">
      <span class="dot" id="projectDot"></span>
      <span class="label">Project</span>
      <span class="value" id="projectVal">checking…</span>
    </div>
    <div class="row">
      <span class="dot ok"></span>
      <span class="label">Ext ID</span>
      <span class="value" id="idVal">—</span>
      <button class="copy" id="copyBtn" title="Copy ID">copy</button>
    </div>

    <div class="error" id="err"></div>

    <div class="actions">
      <button id="openBtn" class="primary">Open Flow</button>
      <button id="refreshBtn">Refresh</button>
    </div>

    <div class="hint">
      Paste the Ext ID into <code>.env.local</code> as<br />
      <code>VITE_FLOW_EXT_ID=...</code> then restart vite.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
